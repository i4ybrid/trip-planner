version: '3.8'

services:
  frontend:
    image: trip-planner-frontend:prod
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    ports:
      - "16199:16199"
    environment:
      - NODE_ENV=production
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=https://plan.eric-hu.com
      - NEXT_PUBLIC_APP_URL=https://plan.eric-hu.com
      - NEXT_PUBLIC_API_URL=https://plan-api.eric-hu.com/api
    restart: unless-stopped

  backend:
    image: trip-planner-backend:prod
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    ports:
      - "16198:4000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - PORT=4000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=https://plan.eric-hu.com
      - FRONTEND_URL=https://plan.eric-hu.com
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    ports:
      - "16197:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: tripplanner
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
