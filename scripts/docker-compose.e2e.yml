version: '3.8'

services:
  db-e2e:
    image: postgres:15-alpine
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tripplanner_e2e
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-e2e:
    image: redis:7-alpine
    ports:
      - "16379:6379"

  mailhog-e2e:
    image: mailhog/mailhog
    ports:
      - "11025:1025"
      - "18025:8025"
