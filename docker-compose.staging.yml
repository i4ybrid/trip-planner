version: '3.8'

services:
  frontend:
    image: trip-planner-frontend:staging
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
      args:
        - INTERNAL_API_URL=http://192.168.0.189:16198/api
        - NEXT_PUBLIC_API_URL=http://192.168.0.189:16198/api
        - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
        - NEXTAUTH_URL=http://192.168.0.189:16199
        - AUTH_TRUST_HOST=true
    ports:
      - "16199:16199"
    environment:
      - NODE_ENV=production
      - INTERNAL_API_URL=http://backend:4000/api
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=http://192.168.0.189:16199
      - NEXT_PUBLIC_API_URL=http://192.168.0.189:16198/api
      - NEXT_PUBLIC_APP_URL=http://192.168.0.189:16199
      - AUTH_TRUST_HOST=true
    restart: unless-stopped

  backend:
    image: trip-planner-backend:staging
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    ports:
      - "16198:4000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - PORT=4000
      - FRONTEND_URL=http://192.168.0.189:16199
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=http://192.168.0.189:16199
      - AUTH_TRUST_HOST=true
      - RATE_LIMIT_MAX=1000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    ports:
      - "16197:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: tripplanner
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
